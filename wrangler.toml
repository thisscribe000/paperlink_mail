name = "paperlink-storage"
main = "src/index.ts"
compatibility_date = "2024-06-14"

[[d1_databases]]
binding = "DB"
database_name = "paperlink-storage"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "paperlink-files"

[vars]
APP_URL = "https://paperlink.app"